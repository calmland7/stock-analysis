<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>적중률 트래커</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --line: #21262d;
    --text: #e6edf3; --muted: #8b949e;
    --up: #3fb950; --down: #f85149; --wait: #6e7681; --accent: #58a6ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 20px; max-width: 880px; margin: 0 auto;
  }
  a { color: var(--accent); text-decoration: none; }
  .back { font-size: 14px; color: var(--muted); }
  h1 { font-size: 22px; margin: 12px 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  /* 요약 카드 */
  .summary {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; padding: 16px 12px; text-align: center;
  }
  .stat .num { font-size: 26px; font-weight: 700; }
  .stat .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .hit .num { color: var(--up); }

  /* 기록 카드 리스트 */
  .row {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px;
  }
  .row .name { font-weight: 600; flex: 1; }
  .row .name small { display: block; color: var(--muted); font-weight: 400; font-size: 12px; }
  .badge {
    font-size: 12px; padding: 3px 8px; border-radius: 6px;
    background: var(--line); color: var(--muted);
  }
  .ret { font-weight: 700; min-width: 64px; text-align: right; }
  .ret.up { color: var(--up); } .ret.down { color: var(--down); }
  .ret.wait { color: var(--wait); font-weight: 400; }
  .result { font-size: 18px; min-width: 28px; text-align: center; }

  @media (max-width: 560px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
  <a class="back" href="/">← 목록</a>
  <h1>📊 적중률 트래커</h1>
  <div class="sub" id="updated">불러오는 중…</div>

  <div class="summary" id="summary"></div>
  <div id="list"></div>

<script>
const dirColor = {}; // 방향 텍스트는 그대로 배지로 표시

async function load() {
  let json;
  try {
    const res = await fetch('/api/record');
    json = await res.json();
    if (json.error) throw new Error(json.error);
  } catch (e) {
    document.getElementById('updated').textContent = '데이터를 불러오지 못했습니다: ' + e.message;
    return;
  }

  const { summary, records } = json;
  document.getElementById('updated').textContent =
    `검증 ${summary.검증건수}건 · 대기 ${summary.대기건수}건`;

  // 요약 카드
  document.getElementById('summary').innerHTML = `
    <div class="stat hit">
      <div class="num">${summary.적중률 ?? '–'}${summary.적중률 != null ? '%' : ''}</div>
      <div class="lbl">적중률</div>
    </div>
    <div class="stat">
      <div class="num">${summary.적중수}/${summary.검증건수}</div>
      <div class="lbl">적중 / 검증</div>
    </div>
    <div class="stat">
      <div class="num">${summary.평균수익 != null ? (summary.평균수익 > 0 ? '+' : '') + summary.평균수익 + '%' : '–'}</div>
      <div class="lbl">평균 수익률</div>
    </div>
    <div class="stat">
      <div class="num">${summary.대기건수}</div>
      <div class="lbl">검증 대기</div>
    </div>`;

  // 기록 리스트
  document.getElementById('list').innerHTML = records.map(d => {
    const 대기 = d.실제가 == null;
    const ret = d.수익률;
    const retCls = 대기 ? 'wait' : (ret > 0 ? 'up' : 'down');
    const retTxt = 대기 ? '⏳ 대기' : (ret > 0 ? '+' : '') + ret + '%';
    const result = 대기 ? '⏳' : (d.적중 ? '✅' : '❌');
    const link = d.report_slug ? `/reports/${d.report_slug}` : '#';
    return `
      <a class="row" href="${link}">
        <div class="name">${d.종목}<small>${d.판정일}${d.코드 ? ' · ' + d.코드 : ''}</small></div>
        <span class="badge">${d.방향}</span>
        <span class="ret ${retCls}">${retTxt}</span>
        <span class="result">${result}</span>
      </a>`;
  }).join('');
}
load();
</script>
</body>
</html>
